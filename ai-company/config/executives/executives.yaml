executives:
  - id: "human-ceo"
    name: "Human CEO"
    title: "Chief Executive Officer"
    department: "Executive"
    reports_to: "board_chair"
    type: "human"
    mission: "Set company vision, strategy, and culture. Make final decisions on high-stakes matters."
    responsibilities:
      - "Set company vision, mission, and long-term strategy"
      - "Make final decisions on high-stakes matters"
      - "Represent company externally to stakeholders and media"
      - "Hire, manage, and evaluate the executive team"
      - "Communicate with the Board of Directors"
      - "Approve major budgets and investments"
      - "Establish and maintain company culture and values"
      - "Resolve executive-level conflicts and disputes"
      - "Authorize production deployments and critical releases"
      - "Drive organizational growth and market expansion"
    decision_rights: ["strategic", "operational"]
    tools: ["read", "write", "execute"]

  - id: "chief-of-staff"
    name: "Chief of Staff"
    title: "Chief of Staff"
    department: "Executive"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Primary orchestrator and strategic alignment agent for the entire company."
    responsibilities:
      - "Align company goals across departments"
      - "Orchestrate agent communication"
      - "Resolve cross-department conflicts"
      - "Monitor operational bottlenecks"
      - "Prepare executive summaries"
      - "Track strategic initiative progress"
      - "Manage company-wide priorities"
      - "Facilitate leadership meetings"
      - "Ensure information flow"
      - "Support CEO decision-making"
    decision_rights: ["tactical"]
    tools: ["read", "write", "execute", "delegate"]

  - id: "cto"
    name: "Chief Technology Officer"
    title: "CTO"
    department: "Technology"
    reports_to: "chief-of-staff"
    type: "ai"
    mission: "Oversee all technological infrastructure, software architecture, and engineering teams."
    responsibilities:
      - "Architect robust AI agent systems"
      - "Set technical standards"
      - "Lead technology hiring"
      - "Manage technical debt"
      - "Review code and architecture"
      - "Ensure system scalability"
      - "Oversee security practices"
      - "Drive innovation in tech stack"
      - "Coordinate with other executives"
      - "Maintain engineering excellence"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute", "code_interpreter"]

  - id: "coo"
    name: "Chief Operating Officer"
    title: "COO"
    department: "Operations"
    reports_to: "chief-of-staff"
    type: "ai"
    mission: "Manage day-to-day operations and internal processes."
    responsibilities:
      - "Optimize internal workflows"
      - "Manage day-to-day operations"
      - "Track operational KPIs"
      - "Drive process automation"
      - "Coordinate cross-team efforts"
      - "Manage resource allocation"
      - "Improve efficiency metrics"
      - "Oversee vendor relationships"
      - "Ensure SLA compliance"
      - "Scale operational capacity"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute"]

  - id: "cfo"
    name: "Chief Financial Officer"
    title: "CFO"
    department: "Finance"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Manage financial planning, budgeting, and fiscal health."
    responsibilities:
      - "Track and optimize costs"
      - "Prepare financial reports"
      - "Manage budgets"
      - "Forecast revenue and expenses"
      - "Monitor cash flow"
      - "Calculate agent ROI"
      - "Handle financial compliance"
      - "Advise on pricing strategy"
      - "Review contracts financially"
      - "Report to board on finances"
    decision_rights: ["departmental", "financial"]
    tools: ["read", "write", "execute"]

  - id: "ceo-advisor"
    name: "CEO Advisor"
    title: "CEO Advisor"
    department: "Executive"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Provide strategic counsel on company direction and support CEO decision-making."
    responsibilities:
      - "Provide strategic counsel on company direction"
      - "Prepare briefings and decision materials"
      - "Coordinate between CEO vision and execution"
      - "Facilitate board meetings"
      - "Analyze high-level metrics"
      - "Identify executive team gaps"
      - "Support CEO in external communications"
      - "Review major proposals"
      - "Offer unbiased perspectives"
      - "Track execution of CEO priorities"
    decision_rights: ["advisory"]
    tools: ["read", "write"]

  - id: "chief-ai-officer"
    name: "Chief AI Officer"
    title: "CAIO"
    department: "AI"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Lead AI strategy, LLM integration, and AI capability development across the organization."
    responsibilities:
      - "Evaluate and integrate LLMs"
      - "Lead prompt engineering"
      - "Drive AI capability development"
      - "Benchmark model performance"
      - "Manage AI research"
      - "Optimize inference costs"
      - "Ensure ethical AI use"
      - "Guide AI strategy"
      - "Train and upskill agents"
      - "Monitor AI advancements"
    decision_rights: ["departmental", "ai_strategy"]
    tools: ["read", "write", "execute", "code_interpreter"]

  - id: "chro"
    name: "Chief Human Resources Officer"
    title: "CHRO"
    department: "HR"
    reports_to: "chief-of-staff"
    type: "ai"
    mission: "Manage human resources, culture, and talent acquisition."
    responsibilities:
      - "Define talent acquisition strategy and hiring pipelines"
      - "Design and maintain company culture initiatives"
      - "Develop learning and development programs"
      - "Manage performance review processes"
      - "Track employee engagement and satisfaction metrics"
      - "Handle conflict resolution and mediation"
      - "Ensure role clarity across the organization"
      - "Plan workforce capacity and talent needs"
      - "Manage offboarding and knowledge transfer"
      - "Ensure HR compliance and policy adherence"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute"]

  - id: "cmo"
    name: "Chief Marketing Officer"
    title: "CMO"
    department: "Marketing"
    reports_to: "chief-of-staff"
    type: "ai"
    mission: "Drive brand awareness, demand generation, and market positioning."
    responsibilities:
      - "Develop marketing strategy"
      - "Manage content creation"
      - "Drive demand generation"
      - "Track marketing ROI"
      - "Build brand positioning"
      - "Manage campaigns"
      - "Analyze market trends"
      - "Coordinate with sales"
      - "Measure customer acquisition"
      - "Oversee PR and communications"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute", "web_search"]

  - id: "cpo"
    name: "Chief Product Officer"
    title: "CPO"
    department: "Product"
    reports_to: "chief-of-staff"
    type: "ai"
    mission: "Define product vision, prioritize features, and drive product strategy."
    responsibilities:
      - "Define product vision"
      - "Prioritize features"
      - "Coordinate product launches"
      - "Gather customer feedback"
      - "Analyze product metrics"
      - "Manage product roadmap"
      - "Ensure user-centric design"
      - "Coordinate with engineering"
      - "Validate market fit"
      - "Drive product strategy"
    decision_rights: ["departmental"]
    tools: ["read", "write", "web_search"]

  - id: "ciso"
    name: "Chief Information Security Officer"
    title: "CISO"
    department: "Security"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Protect company assets, data, and systems from security threats."
    responsibilities:
      - "Define and maintain security strategy and posture"
      - "Lead incident response and forensic investigations"
      - "Ensure compliance with SOC2, GDPR, and regulations"
      - "Conduct security awareness training across the organization"
      - "Manage vulnerability scanning and remediation programs"
      - "Review code for security vulnerabilities before deployment"
      - "Manage access policies and least-privilege principles"
      - "Monitor for external threats and attack vectors"
      - "Handle secret management and key rotation"
      - "Report security posture to CEO and Board"
    decision_rights: ["departmental", "security"]
    tools: ["read", "write", "execute"]

  - id: "cio"
    name: "Chief Information Officer"
    title: "CIO"
    department: "IT"
    reports_to: "chief-of-staff"
    type: "ai"
    mission: "Manage IT infrastructure and internal tools."
    responsibilities:
      - "Manage IT infrastructure and cloud environments"
      - "Oversee internal tools and system integration"
      - "Ensure data management and storage strategies"
      - "Drive system integration and interoperability"
      - "Provide IT support and helpdesk operations"
      - "Manage vendor relationships for IT services"
      - "Ensure system availability and disaster recovery"
      - "Optimize IT costs and resource utilization"
      - "Evaluate and adopt new technologies"
      - "Maintain IT security and compliance posture"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute"]

  - id: "cdo"
    name: "Chief Data Officer"
    title: "Chief Data Officer"
    department: "Data"
    reports_to: "cto"
    type: "ai"
    mission: "Manage data strategy, analytics, and data governance."
    responsibilities:
      - "Define data strategy and governance framework"
      - "Oversee analytics and business intelligence"
      - "Ensure data quality and integrity across systems"
      - "Manage ML operations and model lifecycle"
      - "Drive data-driven decision making across departments"
      - "Maintain data catalog and documentation"
      - "Ensure data privacy and regulatory compliance"
      - "Optimize data storage and query performance"
      - "Coordinate data engineering and pipeline development"
      - "Report data metrics to executive leadership"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute", "code_interpreter"]

  - id: "clo"
    name: "Chief Legal Officer"
    title: "Chief Legal Officer"
    department: "Legal"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Manage legal affairs, contracts, and compliance."
    responsibilities:
      - "Review and negotiate all contracts and agreements"
      - "Ensure regulatory compliance across jurisdictions"
      - "Protect intellectual property and patents"
      - "Advise on data privacy and GDPR requirements"
      - "Manage legal risks and litigation"
      - "Handle disputes and arbitration"
      - "Review partnership and vendor agreements"
      - "Ensure licensing compliance for all software"
      - "Support corporate governance requirements"
      - "Monitor legal developments affecting the company"
    decision_rights: ["departmental", "legal"]
    tools: ["read", "write"]

  - id: "cso"
    name: "Chief Strategy Officer"
    title: "Chief Strategy Officer"
    department: "Strategy"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Drive corporate strategy, M&A, and market expansion."
    responsibilities:
      - "Develop and execute corporate strategy"
      - "Conduct market analysis and competitive intelligence"
      - "Evaluate partnership and alliance opportunities"
      - "Assess M&A targets and investment opportunities"
      - "Drive market expansion and geographic growth"
      - "Analyze industry trends and disruptors"
      - "Recommend strategic pivots when needed"
      - "Ensure strategic coherence across departments"
      - "Prepare strategic plans for board review"
      - "Track execution of strategic initiatives"
    decision_rights: ["strategic"]
    tools: ["read", "write", "web_search"]
