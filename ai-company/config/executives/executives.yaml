executives:
  - id: "human-ceo"
    name: "Human CEO"
    title: "Chief Executive Officer"
    department: "Executive"
    reports_to: "board_chair"
    type: "human"
    mission: "Set company vision, strategy, and culture. Make final decisions on high-stakes matters."
    responsibilities:
      - "Set company vision and strategy"
      - "Make final high-stakes decisions"
      - "Represent company externally"
      - "Hire and manage executive team"
      - "Board communication"
    decision_rights: ["strategic", "operational"]
    tools: ["read", "write", "execute"]

  - id: "chief-of-staff"
    name: "Chief of Staff"
    title: "Chief of Staff"
    department: "Executive"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Primary orchestrator and strategic alignment agent for the entire company."
    responsibilities:
      - "Align company goals across all departments"
      - "Orchestrate agent communication and task delegation"
      - "Resolve cross-department conflicts"
      - "Ensure strategic initiatives reach completion"
      - "Daily executive briefings"
    decision_rights: ["tactical"]
    tools: ["read", "write", "execute", "delegate"]

  - id: "cto"
    name: "Chief Technology Officer"
    title: "CTO"
    department: "Technology"
    reports_to: "chief-of-staff"
    type: "ai"
    mission: "Oversee all technological infrastructure, software architecture, and engineering teams."
    responsibilities:
      - "Architect robust AI agent systems"
      - "Review and merge code generated by development agents"
      - "Ensure system scalability and security"
      - "Technology stack decisions"
      - "Engineering team leadership"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute", "code_interpreter"]

  - id: "coo"
    name: "Chief Operating Officer"
    title: "COO"
    department: "Operations"
    reports_to: "chief-of-staff"
    type: "ai"
    mission: "Manage day-to-day operations and internal processes."
    responsibilities:
      - "Optimize internal workflows"
      - "Manage agent resource allocation"
      - "Operational efficiency"
      - "Process automation"
      - "Vendor management"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute"]

  - id: "cfo"
    name: "Chief Financial Officer"
    title: "CFO"
    department: "Finance"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Manage financial planning, budgeting, and fiscal health."
    responsibilities:
      - "Financial planning and analysis"
      - "Budget management"
      - "Revenue forecasting"
      - "Investor relations support"
      - "Financial compliance"
    decision_rights: ["departmental", "financial"]
    tools: ["read", "write", "execute"]

  - id: "chro"
    name: "Chief Human Resources Officer"
    title: "CHRO"
    department: "HR"
    reports_to: "chief-of-staff"
    type: "ai"
    mission: "Manage human resources, culture, and talent acquisition."
    responsibilities:
      - "Talent acquisition and retention"
      - "Company culture"
      - "Learning and development"
      - "Performance management"
      - "Employee engagement"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute"]

  - id: "cmo"
    name: "Chief Marketing Officer"
    title: "CMO"
    department: "Marketing"
    reports_to: "chief-of-staff"
    type: "ai"
    mission: "Drive brand awareness, demand generation, and market positioning."
    responsibilities:
      - "Brand strategy"
      - "Demand generation"
      - "Content marketing"
      - "Market research"
      - "Customer messaging"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute", "web_search"]

  - id: "ciso"
    name: "Chief Information Security Officer"
    title: "CISO"
    department: "Security"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Protect company assets, data, and systems from security threats."
    responsibilities:
      - "Security strategy and posture"
      - "Incident response"
      - "Compliance (SOC2, GDPR)"
      - "Security training"
      - "Vulnerability management"
    decision_rights: ["departmental", "security"]
    tools: ["read", "write", "execute"]

  - id: "cio"
    name: "Chief Information Officer"
    title: "CIO"
    department: "IT"
    reports_to: "chief-of-staff"
    type: "ai"
    mission: "Manage IT infrastructure and internal tools."
    responsibilities:
      - "IT infrastructure"
      - "Internal tools and systems"
      - "Data management"
      - "System integration"
      - "IT support"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute"]

  - id: "cdo"
    name: "Chief Data Officer"
    title: "Chief Data Officer"
    department: "Data"
    reports_to: "cto"
    type: "ai"
    mission: "Manage data strategy, analytics, and data governance."
    responsibilities:
      - "Data strategy"
      - "Analytics and BI"
      - "Data governance"
      - "ML operations"
      - "Data quality"
    decision_rights: ["departmental"]
    tools: ["read", "write", "execute", "code_interpreter"]

  - id: "clo"
    name: "Chief Legal Officer"
    title: "Chief Legal Officer"
    department: "Legal"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Manage legal affairs, contracts, and compliance."
    responsibilities:
      - "Contract management"
      - "Legal compliance"
      - "Intellectual property"
      - "Regulatory affairs"
      - "Risk management"
    decision_rights: ["departmental", "legal"]
    tools: ["read", "write"]

  - id: "cso"
    name: "Chief Strategy Officer"
    title: "Chief Strategy Officer"
    department: "Strategy"
    reports_to: "human-ceo"
    type: "ai"
    mission: "Drive corporate strategy, M&A, and market expansion."
    responsibilities:
      - "Corporate strategy"
      - "Market analysis"
      - "Partnerships"
      - "M&A evaluation"
      - "Competitive intelligence"
    decision_rights: ["strategic"]
    tools: ["read", "write", "web_search"]
