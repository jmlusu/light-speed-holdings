committees:
  - id: "audit_committee"
    name: "Audit Committee"
    chair: "board-finance"
    members: ["board-finance", "board-risk"]
    responsibilities:
      - "Financial reporting oversight"
      - "Internal audit review"
      - "Compliance monitoring"
    meeting_frequency: "quarterly"

  - id: "compensation_committee"
    name: "Compensation Committee"
    chair: "board-chair"
    members: ["board-chair", "board-strategy"]
    responsibilities:
      - "Executive compensation"
      - "Equity plan administration"
      - "Performance reviews"
    meeting_frequency: "quarterly"

  - id: "technology_committee"
    name: "Technology Committee"
    chair: "board-technology"
    members: ["board-technology", "board-strategy", "board-product"]
    responsibilities:
      - "Technology strategy review"
      - "Architecture decisions"
      - "Security posture"
      - "Product technology alignment"
    meeting_frequency: "monthly"

  - id: "nominating_committee"
    name: "Nominating Committee"
    chair: "board-chair"
    members: ["board-chair", "board-customer"]
    responsibilities:
      - "Board member recruitment"
      - "Succession planning"
      - "Governance best practices"
    meeting_frequency: "quarterly"
