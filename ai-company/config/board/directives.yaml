# Board Directives -- Source of Truth
#
# Each directive represents a formal instruction issued by the Board of Directors
# that must be acknowledged, tracked, and completed by the assigned owner.
#
# Lifecycle: issued -> acknowledged -> in_progress -> completed | overdue
#
# Fields:
#   id:             Unique directive identifier (DIR-YYYY-NNN)
#   title:          Short descriptive title
#   description:    Detailed description of the directive
#   issued_by:      Board member or authority who issued the directive
#   issued_date:    ISO date when the directive was issued
#   deadline:       ISO date by which the directive must be completed
#   priority:       critical | high | medium | low
#   status:         pending | in_progress | completed | overdue
#   owner:          Agent or role responsible for executing the directive
#   completion_date: ISO date when the directive was marked completed (null if not yet)
#   notes:          Free-form notes, links, or commentary

