# Dashboard QA Automation — CI/CD Pipeline
#
# Runs automated dashboard tests on every PR and push to main.
# Tests include: API contracts, scroll behavior, performance, and E2E.
#
# Required secrets: none (all tests run locally against TestClient or Playwright)

name: Dashboard Tests

on:
  push:
    branches: [main]
    paths:
      - 'ai-company/src/ai_company/dashboard/**'
      - 'ai-company/tests/**'
      - 'ai-company/pyproject.toml'
      - '.github/workflows/dashboard-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ai-company/src/ai_company/dashboard/**'
      - 'ai-company/tests/**'
      - 'ai-company/pyproject.toml'

concurrency:
  group: dashboard-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: API Contract & Unit Tests (fast, no browser)
  # ──────────────────────────────────────────────────────────
  api-tests:
    name: "API Contract Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-company/requirements*.txt

      - name: Install dependencies
        working-directory: ai-company
        run: |
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: ai-company
        run: ruff check src/ai_company/dashboard/ tests/unit/test_dashboard_api_response.py

      - name: Type check (mypy)
        working-directory: ai-company
        run: mypy src/ai_company/dashboard/

      - name: Run API contract tests
        working-directory: ai-company
        run: |
          pytest tests/unit/test_dashboard_api_response.py \
            -v \
            --tb=short \
            --junitxml=results/api-tests.xml \
            -x

      - name: Run existing dashboard unit tests
        working-directory: ai-company
        run: |
          pytest tests/unit/test_dashboard.py \
            tests/unit/test_dashboard_smoke.py \
            tests/unit/test_dashboard_ws.py \
            tests/unit/test_dashboard_security.py \
            tests/unit/test_dashboard_repository.py \
            -v \
            --tb=short \
            --junitxml=results/dashboard-unit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: ai-company/results/*.xml

  # ──────────────────────────────────────────────────────────
  # Job 2: Performance Tests
  # ──────────────────────────────────────────────────────────
  performance-tests:
    name: "Performance Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: ai-company
        run: pip install -e ".[dev]" psutil

      - name: Run performance tests
        working-directory: ai-company
        run: |
          pytest tests/performance/test_dashboard_performance.py \
            -v \
            -m performance \
            --tb=short \
            --junitxml=results/performance.xml

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: ai-company/results/performance.xml

  # ──────────────────────────────────────────────────────────
  # Job 3: E2E Scroll Tests (Playwright)
  # ──────────────────────────────────────────────────────────
  e2e-scroll-tests:
    name: "E2E Scroll & Cross-Browser"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        working-directory: ai-company
        run: pip install -e ".[dev]" httpx pytest-playwright

      - name: Install Playwright browsers
        working-directory: ai-company
        run: playwright install --with-deps ${{ matrix.browser }}

      - name: Run scroll fix verification tests
        working-directory: ai-company
        run: |
          pytest tests/e2e/test_scroll_fix_verification.py \
            --browser ${{ matrix.browser }} \
            -v \
            --tb=short \
            --junitxml=results/e2e-scroll-${{ matrix.browser }}.xml

      - name: Run cross-browser tests
        working-directory: ai-company
        run: |
          pytest tests/e2e/test_cross_browser.py \
            --browser ${{ matrix.browser }} \
            -v \
            --tb=short \
            --junitxml=results/e2e-crossbrowser-${{ matrix.browser }}.xml

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.browser }}
          path: ai-company/results/e2e-*.xml

  # ──────────────────────────────────────────────────────────
  # Job 4: Security Scan
  # ──────────────────────────────────────────────────────────
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: ai-company
        run: pip install -e ".[dev]"

      - name: Bandit security scan
        working-directory: ai-company
        run: bandit -r src/ai_company/dashboard/ -c pyproject.toml

      - name: Run dashboard security tests
        working-directory: ai-company
        run: |
          pytest tests/unit/test_dashboard_security.py \
            -v \
            --tb=short

  # ──────────────────────────────────────────────────────────
  # Job 5: Summary
  # ──────────────────────────────────────────────────────────
  test-summary:
    name: "Test Summary"
    runs-on: ubuntu-latest
    needs: [api-tests, performance-tests, e2e-scroll-tests, security-scan]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Print test summary
        run: |
          echo "## Dashboard Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in all-results/**/*.xml; do
            if [ -f "$f" ]; then
              echo "### $(basename $f)" >> $GITHUB_STEP_SUMMARY
              grep -E 'tests=|failures=|errors=|skipped=' "$f" | head -1 >> $GITHUB_STEP_SUMMARY || true
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Fail if any test suite failed
        run: |
          echo "Checking test results..."
          if [ -d "all-results" ]; then
            for f in all-results/**/*.xml; do
              if [ -f "$f" ]; then
                # Check for failures
                if grep -q 'failures="[1-9]' "$f" 2>/dev/null || \
                   grep -q 'errors="[1-9]' "$f" 2>/dev/null; then
                  echo "FAILURES found in $f"
                  exit 1
                fi
              fi
            done
          fi
          echo "All test suites passed."
