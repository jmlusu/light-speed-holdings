# Prometheus configuration for AI Company Builder staging
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ai-company-dashboard"
    static_configs:
      - targets: ["dashboard:9420"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "ai-company-health"
    static_configs:
      - targets: ["dashboard:9420"]
    metrics_path: "/health"
    scrape_interval: 30s
