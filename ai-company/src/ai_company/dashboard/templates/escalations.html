{% extends "base.html" %}
{% block title %}Escalations & Approvals — CEO Dashboard{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
  <!-- ═══ PENDING APPROVALS ═══ -->
  <div>
    <div class="flex items-center justify-between mb-4">
      <div>
        <h2 class="text-xl font-semibold text-surface-100">Pending Approvals</h2>
        <p class="text-sm text-surface-500 mt-1" x-text="approvals.length + ' awaiting decision'"></p>
      </div>
      <button @click="loadApprovals()" class="text-surface-400 hover:text-surface-300 transition-colors p-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      </button>
    </div>

    <div x-show="approvals.length === 0" class="bg-surface-900/80 rounded-xl border border-surface-700/50 p-8 text-center">
      <div class="w-12 h-12 rounded-full bg-emerald-500/10 flex items-center justify-center mx-auto mb-3">
        <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <p class="text-sm text-surface-400">All caught up! No pending approvals.</p>
    </div>

    <div class="space-y-3">
      <template x-for="req in approvals" :key="req.id">
        <div class="bg-surface-900/80 rounded-xl border border-surface-700/50 p-5 hover:border-surface-600 transition-all">
          <div class="flex items-start justify-between mb-3">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-lg bg-purple-500/10 flex items-center justify-center">
                <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
              </div>
              <div>
                <h4 class="text-sm font-semibold text-surface-200" x-text="req.action"></h4>
                <p class="text-xs text-surface-500 font-mono">by <span x-text="req.agent_id"></span></p>
              </div>
            </div>
            <span class="px-2 py-0.5 rounded-full text-[10px] font-medium bg-purple-500/10 text-purple-400">pending</span>
          </div>
          <p class="text-sm text-surface-400 mb-4" x-text="req.description"></p>
          <div class="flex items-center justify-between">
            <span class="text-xs text-surface-600 font-mono" x-text="formatTime(req.requested_at)"></span>
            <div class="flex gap-2">
              <button @click="approveRequest(req.id)"
                      class="px-3 py-1.5 rounded-lg text-xs font-medium bg-emerald-600 text-white hover:bg-emerald-500 transition-colors flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                Approve
              </button>
              <button @click="rejectRequest(req.id)"
                      class="px-3 py-1.5 rounded-lg text-xs font-medium bg-red-500/10 text-red-400 hover:bg-red-500/20 transition-colors flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                Reject
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- ═══ OPEN ESCALATIONS ═══ -->
  <div>
    <div class="flex items-center justify-between mb-4">
      <div>
        <h2 class="text-xl font-semibold text-surface-100">Open Escalations</h2>
        <p class="text-sm text-surface-500 mt-1" x-text="escalations.length + ' require resolution'"></p>
      </div>
      <button @click="loadEscalations()" class="text-surface-400 hover:text-surface-300 transition-colors p-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      </button>
    </div>

    <div x-show="escalations.length === 0" class="bg-surface-900/80 rounded-xl border border-surface-700/50 p-8 text-center">
      <div class="w-12 h-12 rounded-full bg-emerald-500/10 flex items-center justify-center mx-auto mb-3">
        <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <p class="text-sm text-surface-400">All clear! No open escalations.</p>
    </div>

    <div class="space-y-3">
      <template x-for="evt in escalations" :key="evt.task_id">
        <div class="bg-surface-900/80 rounded-xl border border-red-500/20 p-5 hover:border-red-500/30 transition-all">
          <div class="flex items-start justify-between mb-3">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-lg bg-red-500/10 flex items-center justify-center">
                <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
              </div>
              <div>
                <h4 class="text-sm font-semibold text-red-400" x-text="evt.rule_id"></h4>
                <p class="text-xs text-surface-500 font-mono">
                  <span x-text="evt.from_agent"></span>
                  <svg class="w-3 h-3 inline mx-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                  <span x-text="evt.to_agent"></span>
                </p>
              </div>
            </div>
            <span class="px-2 py-0.5 rounded-full text-[10px] font-medium bg-red-500/10 text-red-400">escalated</span>
          </div>
          <p class="text-sm text-surface-400 mb-4" x-text="evt.reason"></p>
          <div class="flex items-center justify-between">
            <span class="text-xs text-surface-600 font-mono" x-text="formatTime(evt.timestamp)"></span>
            <button @click="resolveEscalation(evt.task_id)"
                    class="px-3 py-1.5 rounded-lg text-xs font-medium bg-brand-600 text-white hover:bg-brand-500 transition-colors flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              Resolve
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>
{% endblock %}
