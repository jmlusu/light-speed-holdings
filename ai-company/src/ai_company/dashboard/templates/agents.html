{% extends "base.html" %}
{% block title %}Agents — CEO Dashboard{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <div>
    <h2 class="text-xl font-semibold text-surface-100">Agent Registry</h2>
    <p class="text-sm text-surface-500 mt-1" x-text="agents.length + ' agents registered'"></p>
  </div>
  <div class="flex gap-2">
    <input x-model="agentSearch" type="text" placeholder="Search agents..."
           class="bg-surface-800 border border-surface-700 rounded-lg px-3 py-2 text-sm text-surface-200 placeholder-surface-500 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 w-64">
    <select x-model="agentDeptFilter" class="bg-surface-800 border border-surface-700 rounded-lg px-3 py-2 text-sm text-surface-200 focus:ring-2 focus:ring-brand-500">
      <option value="">All Departments</option>
      <template x-for="dept in uniqueDepartments" :key="dept">
        <option :value="dept" x-text="dept || 'Unassigned'"></option>
      </template>
    </select>
  </div>
</div>

<!-- Agent grid -->
<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
  <template x-for="agent in filteredAgents" :key="agent.name">
    <div class="bg-surface-900/80 rounded-xl border border-surface-700/50 p-5 hover:border-surface-600 transition-all cursor-pointer group"
         @click="selectedAgent = agent">
      <div class="flex items-start justify-between mb-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center text-sm font-bold"
               :class="agentTypeBadge(agent.type)">
            <span x-text="agent.role.charAt(0)"></span>
          </div>
          <div>
            <h3 class="text-sm font-semibold text-surface-200 group-hover:text-brand-400 transition-colors" x-text="agent.role"></h3>
            <p class="text-xs text-surface-500 font-mono" x-text="agent.name"></p>
          </div>
        </div>
        <span class="text-[10px] font-medium px-2 py-0.5 rounded-full" :class="agentTypeBadge(agent.type)" x-text="agent.type"></span>
      </div>
      <div class="space-y-1.5 text-xs text-surface-400">
        <div class="flex items-center gap-2">
          <svg class="w-3.5 h-3.5 text-surface-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
          <span x-text="agent.department || 'No department'"></span>
        </div>
        <div class="flex items-center gap-2">
          <svg class="w-3.5 h-3.5 text-surface-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          <span x-text="'reports to: ' + (agent.reports_to || 'none')"></span>
        </div>
        <div x-show="agent.direct_reports?.length" class="flex items-center gap-2">
          <svg class="w-3.5 h-3.5 text-surface-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span x-text="agent.direct_reports.length + ' direct report(s)'"></span>
        </div>
      </div>
      <p x-show="agent.description" class="mt-3 text-xs text-surface-500 line-clamp-2" x-text="agent.description"></p>
    </div>
  </template>
</div>

<!-- Agent detail modal -->
<div x-show="selectedAgent" x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
     class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4"
     @click.self="selectedAgent = null">
  <div class="bg-surface-900 rounded-2xl shadow-2xl border border-surface-700/50 w-full max-w-lg"
       x-show="selectedAgent" x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
    <div class="p-6">
      <div class="flex justify-between items-start mb-4">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center text-lg font-bold"
               :class="agentTypeBadge(selectedAgent?.type)">
            <span x-text="selectedAgent?.role?.charAt(0)"></span>
          </div>
          <div>
            <h3 class="text-lg font-semibold text-surface-100" x-text="selectedAgent?.role"></h3>
            <p class="text-sm text-surface-500 font-mono" x-text="selectedAgent?.name"></p>
          </div>
        </div>
        <button @click="selectedAgent = null" class="text-surface-500 hover:text-surface-300 transition-colors p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="space-y-3 text-sm">
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-surface-800/50 rounded-lg p-3">
            <span class="text-xs text-surface-500 block mb-1">Type</span>
            <span class="font-medium text-surface-200" x-text="selectedAgent?.type"></span>
          </div>
          <div class="bg-surface-800/50 rounded-lg p-3">
            <span class="text-xs text-surface-500 block mb-1">Department</span>
            <span class="font-medium text-surface-200" x-text="selectedAgent?.department || 'N/A'"></span>
          </div>
        </div>
        <div class="bg-surface-800/50 rounded-lg p-3">
          <span class="text-xs text-surface-500 block mb-1">Reports To</span>
          <span class="font-mono text-xs text-brand-400" x-text="selectedAgent?.reports_to || 'none'"></span>
        </div>
        <div x-show="selectedAgent?.direct_reports?.length" class="bg-surface-800/50 rounded-lg p-3">
          <span class="text-xs text-surface-500 block mb-1">Direct Reports</span>
          <div class="flex flex-wrap gap-1 mt-1">
            <template x-for="r in selectedAgent?.direct_reports || []" :key="r">
              <span class="text-xs font-mono bg-surface-700/50 text-surface-300 px-2 py-0.5 rounded" x-text="r"></span>
            </template>
          </div>
        </div>
        <div x-show="selectedAgent?.model" class="bg-amber-500/5 border border-amber-500/20 rounded-lg p-3">
          <span class="text-xs text-amber-400 block mb-1">Model Override</span>
          <span class="font-mono text-xs text-amber-300" x-text="selectedAgent?.model"></span>
        </div>
        <div class="bg-surface-800/50 rounded-lg p-3">
          <span class="text-xs text-surface-500 block mb-1">Description</span>
          <p class="text-surface-300 text-sm leading-relaxed" x-text="selectedAgent?.description || 'No description available.'"></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
