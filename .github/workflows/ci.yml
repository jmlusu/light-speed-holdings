name: CI

# Authoritative merge gate. All jobs must pass before a PR can merge to main.
# Local pre-commit hooks can be bypassed with --no-verify, so this
# server-side gate is the enforced source of truth for ruff + mypy + pytest.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: ai-company

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Mypy
        run: mypy src/

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q

  harness:
    name: ECL Harness Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: pwsh -NoProfile -File scripts/lint-ecl.ps1

  # All required checks must succeed for the gate to pass.
  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, harness]
    steps:
      - uses: actions/checkout@v5
      - run: echo "All required checks passed (ruff + mypy + pytest + harness)."
