name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-company
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src/
      - run: mypy src/

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-company
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest

  harness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-company
    steps:
      - uses: actions/checkout@v4
      - run: pwsh -NoProfile -File scripts/lint-ecl.ps1
